seed: 42
output_root: outputs

# ChartQA rows carry answer_type="text" (the fetch script preserves the
# upstream label shape). The integer-GT gate inside load_number_vqa_samples
# keeps only the numeric-answerable subset, which is what the anchoring
# analysis requires.
vqa_dataset:
  local_path: inputs/chartqa_test
  answer_type_filter: ["text"]
  require_single_numeric_gt: true

inputs:
  irrelevant_number_dir: inputs/irrelevant_number
  irrelevant_neutral_dir: inputs/irrelevant_neutral
  irrelevant_sets_per_sample: 5

models:
  - name: qwen2.5-vl-7b-instruct
    hf_model: Qwen/Qwen2.5-VL-7B-Instruct
  - name: qwen3-vl-8b-instruct
    hf_model: Qwen/Qwen3-VL-8B-Instruct
  - name: llava-next-interleaved-7b
    hf_model: llava-hf/llava-interleave-qwen-7b-hf

sampling:
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 8

prompt:
  system: |
    You are a visual question answering system.
    Output a single number only. No words, no units, no explanation, no markdown.
    If uncertain, still output the single most likely number.
  user_template: |
    Answer the question using the provided image(s).
    Output a single number.
    Question: {question}
