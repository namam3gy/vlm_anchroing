seed: 42
output_root: outputs

# E5b 5-stratum distance-decay validation on InfoVQA, OneVision Main only.
# Same dataset slice as experiment_e7_infographicvqa_full (n=1147), full
# 5-stratum anchor schedule (12-cond).

vqa_dataset:
  local_path: inputs/infographicvqa_val
  answer_range: 10000
  max_samples: 1147
  require_single_numeric_gt: true

inputs:
  irrelevant_number_dir: inputs/irrelevant_number
  irrelevant_number_masked_dir: inputs/irrelevant_number_masked
  irrelevant_neutral_dir: inputs/irrelevant_neutral
  anchor_sampling: stratified
  stratified_extras: ["masked", "neutral"]
  anchor_distance_scheme: relative

models:
  - name: llava-onevision-qwen2-7b-ov
    hf_model: llava-hf/llava-onevision-qwen2-7b-ov-hf

sampling:
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 16

prompt:
  system: |
    You are a visual question answering system.
    Output a single number only. No words, no units, no explanation, no markdown.
    If uncertain, still output the single most likely number.
  user_template: |
    Answer the question using the provided image(s).
    Output a single number.
    Question: {question}
