seed: 42
output_root: outputs

# Pilot run for encoder-ablation models (E2/E3 prep). 200 samples per answer
# stratum is enough to read off the order-of-magnitude direction-follow rate
# and confirm the pipeline is sound on each new runner. The full 17,730-sample
# runs can then be queued with confidence.

vqa_dataset:
  local_path: inputs/vqav2_number_val
  answer_range: 8
  samples_per_answer: 25
  require_single_numeric_gt: true

inputs:
  irrelevant_number_dir: inputs/irrelevant_number
  irrelevant_neutral_dir: inputs/irrelevant_neutral
  irrelevant_sets_per_sample: 5

models:
  - name: convllava-7b
    hf_model: ConvLLaVA/ConvLLaVA-sft-1536
  - name: llava-1.5-7b
    hf_model: llava-hf/llava-1.5-7b-hf
  - name: internvl3-8b
    hf_model: OpenGVLab/InternVL3-8B-hf
  - name: fastvlm-7b
    hf_model: apple/FastVLM-7B

sampling:
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 8

prompt:
  system: |
    You are a visual question answering system.
    Return valid JSON only in the form {"result": <number>}.
    Use a numeric JSON value for <number>, not a string.
    Do not output any other keys, words, explanation, or markdown.
    If uncertain, still output the single most likely number in that JSON format.
  user_template: |
    Answer the question using the provided image(s).
    Return JSON only in the form {"result": <number>}.
    Question: {question}
