seed: 42
output_root: outputs

# MathVista rows carry answer_type in {"integer", "float", "text"}. The
# anchoring experiment works on integer-answerable questions, so we accept
# "integer" here; the integer-GT gate inside the loader further filters out
# any row whose parsed ground truth is not a bare integer.
vqa_dataset:
  local_path: inputs/mathvista_testmini
  answer_type_filter: ["integer"]
  require_single_numeric_gt: true

inputs:
  irrelevant_number_dir: inputs/irrelevant_number
  irrelevant_neutral_dir: inputs/irrelevant_neutral
  irrelevant_sets_per_sample: 5

models:
  - name: qwen2.5-vl-7b-instruct
    hf_model: Qwen/Qwen2.5-VL-7B-Instruct
  - name: qwen3-vl-8b-instruct
    hf_model: Qwen/Qwen3-VL-8B-Instruct
  - name: llava-next-interleaved-7b
    hf_model: llava-hf/llava-interleave-qwen-7b-hf

sampling:
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 16

prompt:
  system: |
    You are a mathematical visual question answering system.
    Return valid JSON only in the form {"result": <number>}.
    Use a numeric JSON value for <number>, not a string.
    Do not output any other keys, words, explanation, or markdown.
    If uncertain, still output the single most likely number in that JSON format.
  user_template: |
    Answer the question using the provided image(s).
    Return JSON only in the form {"result": <number>}.
    Question: {question}
