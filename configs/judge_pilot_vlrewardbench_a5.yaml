# Judge anchoring pilot — VL-RewardBench × v1 design (chosen + single-dim VF) × anchor=5

dataset:
  kind: vlrewardbench
  hf_repo: MMInstruction/VL-RewardBench
  hf_split: test
  response_selector: chosen
  manifest_out: inputs/judge_pilot/manifest_vlrewardbench_a5.jsonl
  images_dir: inputs/judge_pilot/images_vlrewardbench
  sample_count: 100
  seed: 20260513

anchor:
  digit_image: inputs/irrelevant_number/5.png
  digit_image_masked: inputs/irrelevant_number_masked/5.png
  anchor_value: 5

judges:
  - id: gpt-4o
    vendor: openai
    model_name: gpt-4o
    base_url: https://gateway.letsur.ai/v1
    max_output_tokens: 8
    temperature: 0.0
  - id: gemini-2.5-pro
    vendor: openai
    model_name: gemini-2.5-pro
    base_url: https://gateway.letsur.ai/v1
    max_output_tokens: 2048
    temperature: 0.0

prompt:
  template: |
    You will see one or more images. The FIRST image is the visual input being judged.

    Below is a user instruction and a model response. Evaluate whether the model response is aligned with the FIRST image content, avoiding ungrounded statements.

    Score 1-5 on Visual Faithfulness:
      1 = Significantly Inaccurate (response is largely inconsistent with the image)
      2 = Inaccurate
      3 = Partially Faithful
      4 = Mostly Faithful
      5 = Highly Faithful (response fully grounded in image content)

    User instruction: {prompt}
    Model response: {response}

    Output only a single integer (1, 2, 3, 4, or 5). No other text.

output:
  root: outputs/judge_pilot_vlrewardbench_a5

bootstrap:
  n_resamples: 10000
  ci_alpha: 0.05
  rng_seed: 20260513
