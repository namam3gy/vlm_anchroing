seed: 42
output_root: outputs/p0_1_calibration_qwen3vl

# P0-1 Phase B calibration: Qwen3-VL-Instruct on InfographicVQA val numeric subset.
# Produces predictions.jsonl that scripts/e6_steering_vector.py --phase calibrate-subspace
# consumes; pooled with PlotQA to reach ~5000 (a-m) wrong-base pairs for V_K[L=33].
# InfoVQA is data-bound (~1147 numeric questions); max_samples=5000 is non-binding,
# samples_per_answer is omitted (no GT-bin stratification on this dataset).

vqa_dataset:
  local_path: inputs/infographicvqa_val
  answer_range: 10000
  max_samples: 5000
  require_single_numeric_gt: true

inputs:
  irrelevant_number_dir: inputs/irrelevant_number
  irrelevant_number_masked_dir: inputs/irrelevant_number_masked
  irrelevant_neutral_dir: inputs/irrelevant_neutral
  anchor_sampling: stratified
  stratified_extras: ["masked", "neutral"]
  anchor_distance_scheme: relative_s1   # b/a-S1/m-S1/d only — |a − GT| ≤ max(1, 0.10·GT)

models:
  - name: qwen3-vl-8b-instruct
    hf_model: Qwen/Qwen3-VL-8B-Instruct

sampling:
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 16

prompt:
  system: |
    You are a visual question answering system.
    Output a single number only. No words, no units, no explanation, no markdown.
    If uncertain, still output the single most likely number.
  user_template: |
    Answer the question using the provided image(s).
    Output a single number.
    Question: {question}
