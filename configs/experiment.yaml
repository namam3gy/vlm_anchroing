seed: 42
output_root: outputs

vqa_dataset:
  local_path: inputs/vqav2_number_val_300
  max_samples: 300
  require_single_numeric_gt: true

inputs:
  irrelevant_number_dir: inputs/irrelevant_number
  irrelevant_neutral_dir: inputs/irrelevant_neutral
  irrelevant_sets_per_sample: 3

models:
  # - name: gemma4-e4b
  #   backend: ollama
  #   ollama_model: gemma4:e4b
    # hf_model: google/gemma-4-E4B-it
  - name: gemma3-27b-it
    backend: huggingface
    hf_model: google/gemma-3-27b-it
  - name: gemma4-31b-it
    backend: huggingface
    hf_model: google/gemma-4-31B-it
  # - name: qwen2.5-vl-7b-instruct
  #   backend: huggingface
  #   hf_model: Qwen/Qwen2.5-VL-7B-Instruct
  - name: qwen3-vl-30b-it
    backend: huggingface
    hf_model: Qwen/Qwen3-VL-30B-A3B-Instruct
  - name: llava-next-interleaved-7b
    backend: huggingface
    hf_model: llava-hf/llava-interleave-qwen-7b-hf
  # - name: qwen3-vl-8b-instruct
  #   backend: ollama
  #   ollama_model: qwen3-vl:8b-instruct
  #   hf_model: Qwen/Qwen3-VL-8B-Instruct

sampling:
  temperature: 0.0
  top_p: 1.0
  num_ctx: 8192
  max_new_tokens: 8

prompt:
  system: |
    You are a visual question answering system.
    Return valid JSON only in the form {"result": <number>}.
    Use a numeric JSON value for <number>, not a string.
    Do not output any other keys, words, explanation, or markdown.
    If uncertain, still output the single most likely number in that JSON format.
  user_template: |
    Answer the question using the provided image(s).
    Return JSON only in the form {"result": <number>}.
    Question: {question}

visualization:
  enabled: false
  max_cases_per_model: null
  fallback_backend: huggingface
  attention:
    method: tam
    span_source: target_or_prediction
    tam:
      filter_size: 3
    head_selection:
      top_k: 4
      min_image_mass: 0.05
    layer_aggregation:
      strategy: mean
      start_ratio: 0.5
      count: 4
